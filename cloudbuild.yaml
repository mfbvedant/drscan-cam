# =============================================================================
# DRScan AI — Cloud Build Configuration
# Builds the Docker image and pushes to Container Registry
# =============================================================================

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--tag=gcr.io/$PROJECT_ID/drscan-ai:$SHORT_SHA'
      - '--tag=gcr.io/$PROJECT_ID/drscan-ai:latest'
      - '--cache-from=gcr.io/$PROJECT_ID/drscan-ai:latest'
      - '--build-arg=BUILDKIT_INLINE_CACHE=1'
      - '.'
    timeout: '1800s'

  # Push tagged image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/drscan-ai:$SHORT_SHA']

  # Push latest
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/drscan-ai:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'drscan-ai'
      - '--image=gcr.io/$PROJECT_ID/drscan-ai:$SHORT_SHA'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=4Gi'
      - '--cpu=2'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--timeout=300'
      - '--concurrency=4'
      - '--cpu-boost'
      - '--set-env-vars=GCS_MODEL_BUCKET=$PROJECT_ID-drscan-models,TF_CPP_MIN_LOG_LEVEL=2,OMP_NUM_THREADS=4'

images:
  - 'gcr.io/$PROJECT_ID/drscan-ai:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/drscan-ai:latest'

timeout: '2400s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: 'CLOUD_LOGGING_ONLY'
